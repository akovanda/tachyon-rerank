name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Shell Script Syntax
        run: bash -n scripts/check_runtime.sh
      - name: Python Script Syntax
        run: python3 -m py_compile scripts/bench_sweep.py scripts/fetch_public_demo_data.py
      - name: Build (CPU-only)
        run: cargo build -p tachyon-ann
      - name: Test
        run: cargo test -p tachyon-ann
