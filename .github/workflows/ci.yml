name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Format
        run: cargo fmt --all --check
      - name: Dependency Audit
        run: cargo audit
      - name: Shell Script Syntax
        run: bash -n scripts/check_runtime.sh
      - name: Python Script Syntax
        run: python3 -m py_compile scripts/bench_sweep.py scripts/fetch_public_demo_data.py scripts/bump_version.py
      - name: Build (CPU-only)
        run: cargo build -p tachyon-rerank --locked
      - name: Test
        run: cargo test -p tachyon-rerank --locked
